name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  scanner:
    name: Scanner — build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain (pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --all --locked

      - name: Release build (Linux)
        run: cargo build --release --locked

  installer:
    name: Installer + code-signing simulation
    runs-on: windows-latest
    needs: scanner
    steps:
      - uses: actions/checkout@v4

      - name: Add Windows target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Build scanner (release, windows-msvc)
        run: cargo build --release --locked -p scanner-cli --target x86_64-pc-windows-msvc

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        working-directory: installer/wix
        run: wix build Package.wxs -o sentinel-agent.msi

      - name: Code-signing simulation (catches signing issues early)
        shell: pwsh
        run: |
          ./installer/sign/sign.ps1 -Mode simulate -Path `
            "target/x86_64-pc-windows-msvc/release/sentinel-scan.exe", `
            "installer/wix/sentinel-agent.msi"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-installer
          path: |
            installer/wix/sentinel-agent.msi
            target/x86_64-pc-windows-msvc/release/sentinel-scan.exe
          if-no-files-found: error
