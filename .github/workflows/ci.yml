name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run per ref; cancel superseded runs (also avoids duplicate push+PR runs).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  scanner:
    name: Scanner — build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain (pinned by rust-toolchain.toml)
        run: |
          rustup show
          rustup component add rustfmt clippy

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          # Fall back to the most recent cache for this OS so a Cargo.lock change
          # (new dep / version bump) reuses prior artifacts instead of a full
          # cold rebuild — only the changed crates recompile.
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all --check

      # The GUI (talos-gui / eframe) is a Windows product and needs GL/X11 dev
      # libs to build on Linux; it is built & validated on the Windows job below.
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --exclude talos-gui --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude talos-gui --locked

      - name: Release build (Linux)
        run: cargo build --release --locked --workspace --exclude talos-gui

  installer:
    name: Installer + code-signing simulation
    runs-on: windows-latest
    needs: scanner
    steps:
      - uses: actions/checkout@v4

      # Windows builds are the slow leg; cache the registry + target so repeat
      # runs warm-start. Shares the key namespace with the Release workflow
      # (both windows-msvc), so a release build can reuse this cache and vice
      # versa.
      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build apps (release, windows-msvc)
        run: cargo build --release --locked -p scanner-cli -p talos-agent -p talos-gui --target x86_64-pc-windows-msvc

      - name: Build MSI (WiX 5)
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          $env:Path = "$env:USERPROFILE\.dotnet\tools;$env:Path"
          wix --version
          Set-Location installer/wix
          wix build Package.wxs -o talos-agent.msi
          if (-not (Test-Path talos-agent.msi)) { throw "MSI was not produced" }

      - name: Code-signing simulation (app exes)
        shell: pwsh
        run: |
          ./installer/sign/sign.ps1 -Mode simulate -Path `
            "target/x86_64-pc-windows-msvc/release/talos.exe", `
            "target/x86_64-pc-windows-msvc/release/talos-agent.exe", `
            "target/x86_64-pc-windows-msvc/release/talos-gui.exe"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talos-installer
          path: |
            installer/wix/talos-agent.msi
            target/x86_64-pc-windows-msvc/release/talos.exe
            target/x86_64-pc-windows-msvc/release/talos-agent.exe
            target/x86_64-pc-windows-msvc/release/talos-gui.exe
          if-no-files-found: error
