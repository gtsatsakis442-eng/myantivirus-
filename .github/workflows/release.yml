name: Release

# Produces a downloadable Windows build:
#  * push to main  -> updates a rolling "latest" pre-release (talos.exe + MSI)
#  * tag v*        -> a versioned release
#  * manual run    -> same as latest (Actions tab -> Run workflow)
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app (release, windows-msvc)
        run: cargo build --release --locked -p scanner-cli --target x86_64-pc-windows-msvc

      - name: Build MSI (WiX 5)
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          $env:Path = "$env:USERPROFILE\.dotnet\tools;$env:Path"
          Set-Location installer/wix
          wix build Package.wxs -o talos-agent.msi

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/talos.exe dist/talos.exe
          Copy-Item installer/wix/talos-agent.msi dist/talos-agent.msi
          # Production signing (EV cert in an HSM) would run here on the hardened
          # signing host: ./installer/sign/sign.ps1 -Mode production -Path dist/*

      - name: Also upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: talos-windows
          path: dist/*
          if-no-files-found: error

      - name: Publish versioned release (tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/talos.exe
            dist/talos-agent.msi
          generate_release_notes: true

      - name: Publish rolling "latest" release (main / manual)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Talos EPP — latest build
          prerelease: true
          files: |
            dist/talos.exe
            dist/talos-agent.msi
          body: |
            **Rolling pre-release built from `main`.**

            Download **`talos.exe`** (the standalone app) or **`talos-agent.msi`**
            (the enterprise installer).

            Run it: double-click `talos.exe` for the interactive console, or
            `talos selftest` from a terminal to verify detection.

            > Not production-signed yet — Windows SmartScreen will show an
            > "Unknown Publisher" prompt until the EV certificate is applied
            > (see docs/04-deployment-distribution.md).
