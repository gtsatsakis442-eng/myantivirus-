name: Release

# Produces a downloadable Windows build:
#  * push to main  -> updates a rolling "latest" pre-release (talos.exe + MSI)
#  * tag v*        -> a versioned release
#  * manual run    -> same as latest (Actions tab -> Run workflow)
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# Serialize release runs so two builds never update the "latest" asset at once.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Reuse cargo artifacts across runs (and share with the CI installer job,
      # same windows-msvc target) so releases don't recompile from scratch.
      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build apps (release, windows-msvc)
        run: cargo build --release --locked -p scanner-cli -p talos-agent -p talos-gui --target x86_64-pc-windows-msvc

      - name: Build MSI (WiX 5)
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          $env:Path = "$env:USERPROFILE\.dotnet\tools;$env:Path"
          $m = Select-String -Path Cargo.toml -Pattern '^\s*version\s*=\s*"([^"]+)"' | Select-Object -First 1
          $v = $m.Matches[0].Groups[1].Value
          Write-Host "Building MSI for Talos version: $v"
          Set-Location installer/wix
          wix build Package.wxs -d Version=$v -o talos-agent.msi

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/talos-gui.exe dist/talos-gui.exe
          Copy-Item target/x86_64-pc-windows-msvc/release/talos.exe dist/talos.exe
          Copy-Item target/x86_64-pc-windows-msvc/release/talos-agent.exe dist/talos-agent.exe
          Copy-Item installer/wix/talos-agent.msi dist/talos-agent.msi
          # Production signing (EV cert in an HSM) would run here on the hardened
          # signing host: ./installer/sign/sign.ps1 -Mode production -Path dist/*

      - name: Also upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: talos-windows
          path: dist/*
          if-no-files-found: error

      - name: Read version from Cargo.toml
        id: ver
        shell: pwsh
        run: |
          $m = Select-String -Path Cargo.toml -Pattern '^\s*version\s*=\s*"([^"]+)"' | Select-Object -First 1
          $v = $m.Matches[0].Groups[1].Value
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Talos version: $v"

      - name: Publish versioned release (v<version>)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Talos EPP v${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          files: |
            dist/talos-gui.exe
            dist/talos.exe
            dist/talos-agent.exe
            dist/talos-agent.msi
          body: |
            **Talos EPP v${{ steps.ver.outputs.version }}** — Windows build.

            - **`talos-gui.exe`** — the desktop **GUI app** (double-click it).
            - **`talos.exe`** — the console/CLI scanner (`talos selftest`, `talos update`, `talos agent …`).
            - **`talos-agent.exe`** — the **always-on agent service** (`talos-agent install` registers it as an auto-start Windows Service).
            - **`talos-agent.msi`** — the enterprise installer (GPO / Intune / SCCM) — installs the app **and registers the agent service**.

            **What's in this line:** an always-on **agent service** (real-time
            on-access scanning with auto-quarantine, ransomware **canary guard**,
            and OS-firewall **C2 blocking**) that the GUI/CLI drive over local IPC;
            a first-party signature DB with the `talos ingest` feedback loop;
            multi-source updater (abuse.ch + open YARA + optional ClamAV); and
            reduced heuristic false positives (Authenticode trust + two-signal
            rule). Binaries are self-contained — signatures are embedded.

            > Unsigned build — Windows SmartScreen shows an "Unknown Publisher"
            > prompt (*More info → Run anyway*) until the EV certificate is applied
            > (see docs/04-deployment-distribution.md).

      - name: Publish rolling "latest" release (main / manual)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Talos EPP — latest (v${{ steps.ver.outputs.version }})
          prerelease: true
          files: |
            dist/talos-gui.exe
            dist/talos.exe
            dist/talos-agent.exe
            dist/talos-agent.msi
          body: |
            **Rolling pre-release built from `main` (v${{ steps.ver.outputs.version }}).**

            - **`talos-gui.exe`** — the desktop **GUI app** (double-click it).
            - **`talos.exe`** — the console/CLI scanner (`talos agent …`, `talos selftest`).
            - **`talos-agent.exe`** — the always-on **agent service** (`talos-agent install`).
            - **`talos-agent.msi`** — the enterprise installer (GPO/Intune/SCCM); registers the agent service.

            Binaries are self-contained (signatures embedded). For a pinned
            version, see the **v${{ steps.ver.outputs.version }}** release.

            > Not production-signed yet — Windows SmartScreen will show an
            > "Unknown Publisher" prompt (click *More info → Run anyway*) until
            > the EV certificate is applied (see docs/04-deployment-distribution.md).
